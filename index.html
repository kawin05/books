<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawin's Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Lexend:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --font-display: 'Kanit', sans-serif;
      --font-body: 'Lexend', sans-serif;
      --bg-dark: #1A1C20;
      --accent-rust: #C85D4E;
      --accent-amber: #E8B85C;
      --text-primary: #F0EBE0;
      --text-secondary: rgba(240,235,224,0.7);
      --text-muted: rgba(240,235,224,0.4);
      --border-subtle: rgba(240,235,224,0.06);
      --title-size: 112px;
    }
    body {
      background: linear-gradient(165deg, var(--bg-dark) 0%, #131418 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    main { text-align: center; max-width: 900px; }
    .label {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-rust);
      font-weight: 400;
      margin-bottom: 16px;
    }
    h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: var(--title-size);
      line-height: 1.05;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    h1 .highlight { color: var(--accent-amber); font-style: italic; }
    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--accent-rust), var(--accent-amber));
      margin: 12px auto 48px;
    }
    .books {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .book {
      background: rgba(240,235,224,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 32px 36px;
      min-width: 240px;
    }
    .book h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .book a {
      display: block;
      padding: 8px 0;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 300;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .book a:hover { color: var(--accent-rust); }
    @media (max-width: 768px) {
      :root { --title-size: 56px; }
      .books { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <main>
    <div class="label">Book Summaries</div>
    <h1>My <span class="highlight">Library</span></h1>
    <div class="divider"></div>
    <div class="books">
      <div class="book">
        <h2>Deep Work</h2>
        <a href="Deepwork/deep-work-deck.html">English</a>
        <a href="Deepwork/deep-work-deck-th.html">ภาษาไทย</a>
      </div>
      <div class="book">
        <h2>Ultralearning</h2>
        <a href="ultralearning-deck.html">English</a>
        <a href="ultralearning-deck-thai.html">ภาษาไทย</a>
      </div>
    </div>
  </main>
</body>
</html>
